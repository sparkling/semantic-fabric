name: ci
on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain (pinned via rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace --all-targets
      - name: test
        run: cargo test --workspace
      # DuckDB backend (embedded, `bundled` feature — no external service needed).
      # `cargo test --workspace` above doesn't enable `duckdb-backend` and no other
      # crate in the dependency graph turns it on, so these tests never ran in CI
      # until this dedicated step was added.
      - name: test (sf-sql duckdb-backend)
        run: cargo test -p sf-sql --features duckdb-backend
      # SAP HANA marshalling/quoting unit tests only (backend::hana::tests::with_driver) —
      # pure value-marshalling logic with no connection, safe to run here. The rest of
      # the hana-backend surface needs a live SAP HANA server, so it's excluded.
      - name: test (sf-sql hana-backend marshalling)
        run: cargo test -p sf-sql --features hana-backend backend::hana::tests::with_driver
      # W3C RDB2RDF conformance gate (ADR-0005) — verified 2026-07-05: 82 adjudicated,
      # 0 unexpected failures, 1 documented deviation (ADR-0015). The conformance run
      # regenerates the EARL report files with non-deterministic bnode labels; that
      # diff is expected and not committed.
      - name: conformance (W3C RDB2RDF)
        run: cargo run -p sf-cli -- conformance

  readiness:
    name: meta-harness readiness telemetry (ADR-0026)
    runs-on: ubuntu-latest
    # Read-layer telemetry only (ADR-0026 Part A) — non-blocking, drift tracking.
    # 2026-07-05 baseline: harnessFit 71 · compileConfidence 100 · scaffoldReady true.
    # Version PINNED, never @latest: the upstream ruflo-metaharness plugin's own
    # _harness.mjs documents this as a fixed HIGH-severity issue — @latest means a
    # compromised upstream publish executes arbitrary code on the very next call.
    # Bump METAHARNESS_PIN in lock-step with the ruflo-metaharness plugin's pin, on
    # a manual, verified version bump only.
    continue-on-error: true
    env:
      METAHARNESS_PIN: metaharness@~0.3.0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: harness score + genome + mcp-scan + threat-model (informational snapshot)
        run: |
          { echo '### Meta-harness readiness (ADR-0026)'; echo '```json'; } >> "$GITHUB_STEP_SUMMARY"
          npx -y -p "$METAHARNESS_PIN" metaharness score . --json | tee score.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx -y -p "$METAHARNESS_PIN" metaharness genome . --json || true
          npx -y -p "$METAHARNESS_PIN" harness mcp-scan . --json || true
          npx -y -p "$METAHARNESS_PIN" harness threat-model . --json || true
          fit=$(jq -r '.harnessFit' score.json)
          echo "harnessFit=$fit (ADR-0026 baseline: 71)"
          if [ "$fit" -lt 60 ]; then
            echo "::warning::harnessFit $fit is below the 60 floor — readiness regression vs ADR-0026 baseline"
          fi
          # oia-audit / drift-from-history persist to a stateful memory store and are
          # not meaningful in an ephemeral CI runner — run those interactively/locally
          # per ADR-0026 Part A, not here.
