name: ci
on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    # Live PostgreSQL/MySQL/SQL Server service containers so the graceful-skip
    # integration suites (differential_pg_sqlite, mysql_e2e, differential_mssql,
    # mysql_release, constant_memory, adversarial_antijoin_review) actually run in
    # CI instead of silently no-op'ing. `sqlserver-backend` is already enabled here
    # via workspace feature unification (sf-conformance depends on sf-sql with it
    # on) — no extra --features flag needed for the `test` step below.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sftest
          POSTGRES_PASSWORD: sftest
          POSTGRES_DB: sftest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: sftest
          MYSQL_DATABASE: sftest
        ports:
          - 13306:3306
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: SfTest123!
        ports:
          - 11433:1433
    env:
      SF_PG_URL: "host=localhost port=5432 user=sftest password=sftest dbname=sftest"
      SF_MYSQL_URL: "mysql://root:sftest@127.0.0.1:13306/sftest"
      SF_MSSQL_URL: "server=tcp:localhost,11433;user id=SA;password=SfTest123!"
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain (pinned via rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      # SQL Server has no lightweight in-container healthcheck tool available to
      # `options:`, unlike postgres/mysql above — poll the TCP port directly instead.
      - name: wait for SQL Server
        run: |
          for i in $(seq 1 30); do
            (echo > /dev/tcp/localhost/11433) >/dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "::warning::SQL Server did not become reachable in time — differential_mssql will skip gracefully"
      # Dependency vulnerability gate (F2 item 3, ADR-0010 closeout receipt):
      # `cargo audit` reads .cargo/audit.toml's documented ignore-list (advisories
      # confirmed unfixable without an upstream crate's own version bump) and fails
      # the build on anything not on it — a real gate, not `|| true`.
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace --all-targets
      - name: test
        run: cargo test --workspace
      # DuckDB backend (embedded, `bundled` feature — no external service needed).
      # `cargo test --workspace` above doesn't enable `duckdb-backend` and no other
      # crate in the dependency graph turns it on, so these tests never ran in CI
      # until this dedicated step was added.
      - name: test (sf-sql duckdb-backend)
        run: cargo test -p sf-sql --features duckdb-backend
      # SAP HANA marshalling/quoting unit tests only (backend::hana::tests::with_driver) —
      # pure value-marshalling logic with no connection, safe to run here. The rest of
      # the hana-backend surface needs a live SAP HANA server, so it's excluded.
      - name: test (sf-sql hana-backend marshalling)
        run: cargo test -p sf-sql --features hana-backend backend::hana::tests::with_driver
      # ODBC quote-escaping unit tests only (backend::odbc::real::tests) — pure string
      # logic, no live driver/DSN needed. `odbc-api` links against the SYSTEM unixODBC
      # library at COMPILE time even for this (confirmed: the feature fails to link
      # without libodbc present, despite the test itself doing no ODBC I/O), so the
      # driver manager package is installed first; the rest of the odbc-backend surface
      # (DB2/H2/Spark/Dremio/Denodo/Teiid) needs a live DSN, so it's excluded.
      - name: install unixODBC (odbc-backend link dependency)
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev
      - name: test (sf-sql odbc-backend quote-escaping)
        run: cargo test -p sf-sql --features odbc-backend backend::odbc::real::tests
      # W3C RDB2RDF conformance gate (ADR-0005) — verified 2026-07-05: 82 adjudicated,
      # 0 unexpected failures, 1 documented deviation (ADR-0015). The conformance run
      # regenerates the EARL report files with non-deterministic bnode labels; that
      # diff is expected and not committed.
      - name: conformance (W3C RDB2RDF)
        run: cargo run -p sf-cli -- conformance

  readiness:
    name: meta-harness readiness telemetry (ADR-0026)
    runs-on: ubuntu-latest
    # Read-layer telemetry only (ADR-0026 Part A) — non-blocking, drift tracking.
    # 2026-07-05 baseline: harnessFit 71 · compileConfidence 100 · scaffoldReady true.
    # Version PINNED, never @latest: the upstream ruflo-metaharness plugin's own
    # _harness.mjs documents this as a fixed HIGH-severity issue — @latest means a
    # compromised upstream publish executes arbitrary code on the very next call.
    # Bump METAHARNESS_PIN in lock-step with the ruflo-metaharness plugin's pin, on
    # a manual, verified version bump only.
    continue-on-error: true
    env:
      METAHARNESS_PIN: metaharness@~0.3.0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: harness score + genome + mcp-scan + threat-model (informational snapshot)
        run: |
          { echo '### Meta-harness readiness (ADR-0026)'; echo '```json'; } >> "$GITHUB_STEP_SUMMARY"
          npx -y -p "$METAHARNESS_PIN" metaharness score . --json | tee score.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx -y -p "$METAHARNESS_PIN" metaharness genome . --json || true
          npx -y -p "$METAHARNESS_PIN" harness mcp-scan . --json || true
          npx -y -p "$METAHARNESS_PIN" harness threat-model . --json || true
          fit=$(jq -r '.harnessFit' score.json)
          echo "harnessFit=$fit (ADR-0026 baseline: 71)"
          if [ "$fit" -lt 60 ]; then
            echo "::warning::harnessFit $fit is below the 60 floor — readiness regression vs ADR-0026 baseline"
          fi
          # oia-audit / drift-from-history persist to a stateful memory store and are
          # not meaningful in an ephemeral CI runner — run those interactively/locally
          # per ADR-0026 Part A, not here.
