# cargo-audit ignore-list (F2 item 3, ADR-0010 closeout receipt).
#
# `cargo audit` gates CI (.github/workflows/ci.yml); these are the advisories
# open on 2026-07-19 that are NOT trivially fixable — each comes in transitively
# through a third-party crate's OWN pinned dependency requirement, confirmed via
# `cargo update -p <crate> --dry-run` -> "Locking 0 packages to latest compatible
# versions" (no in-range upgrade exists; the fix needs the upstream crate itself
# to bump its own requirement, not a change made here). One advisory
# (RUSTSEC-2026-0204, crossbeam-epoch 0.9.18) WAS trivially fixable (a
# same-range Cargo.lock bump to 0.9.20) and was applied directly instead of
# ignored here.
#
# Re-verify periodically: re-run `cargo update -p <crate> --dry-run` and drop
# the entry once a compatible fixed version becomes resolvable.

[advisories]
ignore = [
    # quick-xml 0.37.5, transitive via oxrdfxml/sparesults (the Oxigraph
    # RDF/XML + SPARQL-results stack, ADR-0004) — our pinned sparesults 0.3.3
    # requires quick-xml "^0.37", which does not admit the fixed >=0.41.0.
    "RUSTSEC-2026-0195", # quick-xml: unbounded namespace-declaration allocation (DoS, 7.5 high)
    "RUSTSEC-2026-0194", # quick-xml: quadratic run time on duplicate attribute names (DoS, 7.5 high)

    # rustls-webpki 0.101.7, transitive via tiberius 0.12.3 (the SQL Server /
    # MSSQL driver, sf-sql's mssql backend), which pins the older rustls 0.21
    # stack. An already-patched rustls-webpki 0.103.13 coexists in the tree via
    # the mysql_async/reqwest/oxigraph rustls-0.23 stack; this ignore covers
    # only the tiberius-pinned 0.101.7 instance.
    "RUSTSEC-2026-0104", # rustls-webpki: reachable panic in CRL parsing
    "RUSTSEC-2026-0098", # rustls-webpki: name constraints for URI names incorrectly accepted
    "RUSTSEC-2026-0099", # rustls-webpki: name constraints accepted for wildcard-asserting certs
]
